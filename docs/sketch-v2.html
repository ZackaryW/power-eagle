
<style>
*{box-sizing:border-box;margin:0;padding:0}
.pe{background:var(--color-background-tertiary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;min-height:580px;display:flex;flex-direction:column;font-family:var(--font-mono)}
.pe-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.pe-logo{font-size:13px;font-weight:500;color:var(--color-text-primary);letter-spacing:-.3px}
.pe-logo em{color:var(--color-text-secondary);font-style:normal;font-weight:400}
.pe-tabs{display:flex;gap:2px;margin-left:auto}
.tab{font-size:11px;font-family:var(--font-mono);padding:4px 10px;border-radius:6px;border:0.5px solid transparent;cursor:pointer;color:var(--color-text-secondary);background:transparent}
.tab.on{background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.tab.disabled{opacity:.4;cursor:default;pointer-events:none}
.pe-body{display:flex;flex:1;overflow:hidden;min-height:0}
.pe-side{width:216px;border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;flex-direction:column;flex-shrink:0}
.pe-side-search{padding:9px 9px 7px;border-bottom:0.5px solid var(--color-border-tertiary)}
.pe-side-search input{width:100%;font-size:11px;font-family:var(--font-mono);padding:5px 8px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.pe-list{flex:1;overflow-y:auto;padding:5px}
.pi{padding:8px 9px;border-radius:6px;cursor:pointer;border:0.5px solid transparent;margin-bottom:2px;user-select:none}
.pi:hover{background:var(--color-background-primary)}
.pi.on{background:var(--color-background-primary);border-color:var(--color-border-secondary)}
.pi.launching{border-color:#1D9E75;background:var(--color-background-primary)}
.pi-name{font-size:11px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:5px}
.pi-sub{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.pi-hint{font-size:9px;color:var(--color-text-tertiary);margin-top:3px;font-style:italic}
.badge{font-size:9px;padding:1px 5px;border-radius:4px}
.badge-info{background:var(--color-background-info);color:var(--color-text-info)}
.badge-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-ok{background:var(--color-background-success);color:var(--color-text-success)}
.badge-muted{background:var(--color-background-tertiary);color:var(--color-text-tertiary);border:0.5px solid var(--color-border-tertiary)}
.badge-local{background:#EDE9FE;color:#534AB7}
.badge-running{background:#E1F5EE;color:#0F6E56}
.pe-main{flex:1;overflow-y:auto;background:var(--color-background-primary)}
.sec{padding:18px 20px}
.sec-label{font-size:10px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 13px;margin-bottom:14px;font-size:11px;font-family:var(--font-mono)}
.row{display:flex;align-items:center;gap:8px;padding:2px 0}
.row-key{color:var(--color-text-tertiary);min-width:78px;flex-shrink:0}
.row-val{color:var(--color-text-primary)}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:13px 0}
.btn{font-size:11px;font-family:var(--font-mono);padding:6px 12px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
.btn:hover{background:var(--color-background-secondary)}
.btn-danger{color:var(--color-text-danger);border-color:var(--color-border-danger)}
.btn-danger:hover{background:var(--color-background-danger)}
.btn-ok{color:var(--color-text-success);border-color:var(--color-border-success)}
.btn-launch{color:#0F6E56;border-color:#5DCAA5}
.btn-launch:hover{background:#E1F5EE}
.input-full{width:100%;font-size:11px;font-family:var(--font-mono);padding:6px 9px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
.input-full:focus{border-color:var(--color-border-primary)}
.prog-track{height:3px;border-radius:2px;background:var(--color-border-tertiary);overflow:hidden;margin:4px 0}
.prog-bar{height:100%;background:#1D9E75;border-radius:2px;width:0%;transition:width .28s ease}
.log-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 11px;font-size:10px;font-family:var(--font-mono);color:var(--color-text-secondary);max-height:100px;overflow-y:auto}
.log-ok{color:#1D9E75}.log-err{color:var(--color-text-danger)}.log-info{color:var(--color-text-secondary)}
.empty{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--color-text-tertiary);font-size:12px;font-family:var(--font-mono);padding:60px 20px;text-align:center;min-height:200px}
.pkg-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px}
.pkg-row:last-child{border-bottom:none}
.pkg-name{font-weight:500;color:var(--color-text-primary);flex:1}
.pkg-id{font-size:10px;color:var(--color-text-tertiary)}
.toggle-track{width:30px;height:17px;border-radius:9px;background:var(--color-border-secondary);position:relative;cursor:pointer;transition:background .18s;flex-shrink:0}
.toggle-track.on{background:#1D9E75}
.toggle-thumb{width:11px;height:11px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:left .18s}
.toggle-track.on .toggle-thumb{left:16px}

.plugin-win{display:flex;flex-direction:column;height:100%}
.plugin-win-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0}
.plugin-win-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.plugin-win-meta{font-size:10px;color:var(--color-text-tertiary)}
.plugin-win-body{flex:1;overflow-y:auto;padding:16px}
.plugin-ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.plugin-input{font-size:11px;font-family:var(--font-mono);padding:5px 9px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;flex:1;min-width:0}
.plugin-input:focus{border-color:var(--color-border-primary)}
.card-item{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;font-size:11px;display:flex;align-items:center;gap:10px}
.card-item-main{flex:1;min-width:0}
.card-item-name{font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item-path{font-size:10px;color:var(--color-text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-mono);margin-top:2px}
.card-item-actions{display:flex;gap:6px;flex-shrink:0}
.card-btn{font-size:10px;font-family:var(--font-mono);padding:3px 8px;border-radius:5px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.card-btn:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.card-btn-danger{color:var(--color-text-danger);border-color:var(--color-border-danger)}
.ext-chip{display:inline-block;font-size:10px;padding:3px 9px;border-radius:5px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-mono);margin:3px}
.ext-chip:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.tag-chip{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);margin:2px;font-family:var(--font-mono)}
.prog-label{font-size:10px;color:var(--color-text-secondary);font-family:var(--font-mono);margin-top:3px}
.notif{background:#E1F5EE;border:0.5px solid #5DCAA5;border-radius:var(--border-radius-md);padding:8px 12px;font-size:11px;color:#085041;font-family:var(--font-mono);margin-bottom:10px;display:none}
</style>

<h2 class="sr-only">Power Eagle v2 — plugin manager with double-click to launch</h2>

<div class="pe">
<div class="pe-bar">
  <div class="pe-logo">power<em>eagle</em> <em style="font-size:10px;color:var(--color-text-tertiary)">v2.0</em></div>
  <div class="pe-tabs">
    <button class="tab" onclick="nav('installed')">installed</button>
    <button class="tab" onclick="nav('buckets')">buckets</button>
    <button class="tab" onclick="nav('url')">url install</button>
    <button class="tab disabled">ai [soon]</button>
  </div>
</div>
<div class="pe-body">
  <div class="pe-side">
    <div class="pe-side-search">
      <input type="text" placeholder="filter installed..." oninput="filterInstalled(this.value)"/>
    </div>
    <div class="pe-list" id="inst-list"></div>
  </div>
  <div class="pe-main" id="main"></div>
</div>
</div>

<script>
const BUCKETS=[
  {id:"pe-community",name:"pe-community",url:"https://github.com/power-eagle/community-bucket",branch:"main",lastSync:"2026-04-08",status:"ok",plugins:[
    {id:"recent-libraries",name:"Recent Libraries",version:"2.1.0",type:"button",keywords:["library","management"],description:"Browse and manage Eagle library history"},
    {id:"file-creator",name:"File Creator",version:"2.0.0",type:"button",keywords:["files","create"],description:"Create files with custom extensions"},
    {id:"ai-tagger",name:"AI Tagger",version:"2.0.0",type:"button",keywords:["ai","tags","vision"],description:"Tag selected items via vision model"},
    {id:"folder-sync",name:"Folder Sync",version:"1.3.0",type:"button",keywords:["sync","folders"],description:"Mirror external folder trees into Eagle"},
    {id:"bulk-rename",name:"Bulk Rename",version:"1.0.2",type:"button",keywords:["rename","batch"],description:"Pattern-based batch rename for items"},
  ]},
  {id:"pe-tools",name:"pe-tools",url:"https://github.com/power-eagle/tools-bucket",branch:"main",lastSync:"2026-04-07",status:"ok",plugins:[
    {id:"color-palette",name:"Color Palette",version:"1.1.0",type:"button",keywords:["color","palette"],description:"Extract and export color palettes from images"},
    {id:"exif-viewer",name:"EXIF Viewer",version:"1.0.0",type:"button",keywords:["exif","metadata"],description:"View EXIF metadata for selected images"},
  ]}
];

let installed=[];
let selInstalled=null;
let launchedId=null;
let selBucket=BUCKETS[0].id;
let currentTab='buckets';
let filterQ='';
let clickTimers={};

const MOCK_LIBS=[
  {name:"Main Library",path:"C:/Users/Zackary/Documents/Eagle/Main.library",valid:true},
  {name:"Archive 2023",path:"C:/Users/Zackary/Documents/Eagle/Archive2023.library",valid:true},
  {name:"Projects",path:"D:/Eagle/Projects.library",valid:false},
  {name:"References",path:"C:/Users/Zackary/Pictures/References.library",valid:true},
];
const MOCK_FILES=[
  {name:"invoice-2024-03",ext:"pdf"},{name:"meeting-notes",ext:"md"},
  {name:"component-spec",ext:"json"},{name:"readme",ext:"txt"},
];
const MOCK_ITEMS=[
  {name:"hero-banner.jpg",tags:[]},{name:"logo-v3.png",tags:[]},
  {name:"background-texture.png",tags:["design"]},{name:"icon-set.svg",tags:[]},
];

function nav(tab){
  currentTab=tab;
  if(tab!=='installed') launchedId=null;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['installed','buckets','url'];
    t.classList.toggle('on',tabs[i]===tab);
  });
  renderSide();
  renderMain();
}

function filterInstalled(q){filterQ=q.toLowerCase();renderSide();}

function renderSide(){
  const list=document.getElementById('inst-list');
  const vis=installed.filter(p=>!filterQ||p.name.toLowerCase().includes(filterQ)||p.id.toLowerCase().includes(filterQ)||(p.keywords||[]).some(k=>k.includes(filterQ)));
  if(!vis.length){
    list.innerHTML=`<div style="padding:16px 10px;font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono)">${installed.length?'no match':'no plugins installed'}</div>`;
    return;
  }
  list.innerHTML=vis.map(p=>{
    const isLaunched=launchedId===p.id;
    return`<div class="pi ${selInstalled===p.id&&currentTab==='installed'?'on':''} ${isLaunched?'launching':''}"
      onclick="singleClick('${p.id}')"
      ondblclick="launchPlugin('${p.id}')">
      <div class="pi-name">
        <span>${p.name}</span>
        <span class="badge ${p.source==='local'?'badge-local':'badge-muted'}">${p.source==='local'?'local':p.bucket||'?'}</span>
        ${isLaunched?'<span class="badge badge-running">running</span>':''}
        ${!p.enabled?'<span style="font-size:9px;color:var(--color-text-tertiary)">[off]</span>':''}
      </div>
      <div class="pi-sub">${p.id} · v${p.version}</div>
      ${!isLaunched?'<div class="pi-hint">double-click to launch</div>':''}
    </div>`;
  }).join('');
}

function singleClick(id){
  if(clickTimers[id]){clearTimeout(clickTimers[id]);delete clickTimers[id];return;}
  clickTimers[id]=setTimeout(()=>{
    delete clickTimers[id];
    selInstalled=id;
    if(launchedId!==id){launchedId=null;}
    currentTab='installed';
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));
    renderSide();
    renderMain();
  },220);
}

function launchPlugin(id){
  if(clickTimers[id]){clearTimeout(clickTimers[id]);delete clickTimers[id];}
  const p=installed.find(x=>x.id===id);
  if(!p||!p.enabled) return;
  launchedId=id;
  selInstalled=id;
  currentTab='installed';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));
  renderSide();
  renderMain();
}

function closePlugin(){
  launchedId=null;
  renderSide();
  renderMain();
}

function renderMain(){
  const m=document.getElementById('main');
  if(currentTab==='installed') renderInstalled(m);
  else if(currentTab==='buckets') renderBuckets(m);
  else if(currentTab==='url') renderURL(m);
}

function renderInstalled(m){
  if(launchedId){renderPluginWindow(m,launchedId);return;}
  if(!selInstalled||!installed.find(p=>p.id===selInstalled)){
    m.innerHTML=`<div class="empty">select an installed plugin<br><span style="font-size:10px;margin-top:4px">double-click to launch · single-click to inspect</span></div>`;
    return;
  }
  const p=installed.find(x=>x.id===selInstalled);
  const isLocal=p.source==='local';
  const bucket=isLocal?null:BUCKETS.find(b=>b.id===p.bucket);
  const latest=bucket?.plugins.find(x=>x.id===p.id);
  const hasUpdate=latest&&latest.version!==p.version;
  m.innerHTML=`<div class="sec">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px">
      <div>
        <div style="font-size:15px;font-weight:500;color:var(--color-text-primary)">${p.name}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px">${p.description||''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--color-text-secondary);cursor:pointer;flex-shrink:0" onclick="togglePlugin('${p.id}')">
        <div class="toggle-track ${p.enabled?'on':''}"><div class="toggle-thumb"></div></div>
        <span>${p.enabled?'enabled':'disabled'}</span>
      </div>
    </div>
    <div class="sec-label">info</div>
    <div class="box">
      <div class="row"><span class="row-key">id</span><span class="row-val">${p.id}</span></div>
      <div class="row"><span class="row-key">version</span><span class="row-val">${p.version}${hasUpdate?` <span class="badge badge-warn" style="margin-left:6px">→ ${latest.version} available</span>`:''}</span></div>
      <div class="row"><span class="row-key">source</span><span class="row-val">${isLocal?'<span class="badge badge-local">local url</span>':`<span class="badge badge-muted">${p.bucket}</span>`}</span></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-launch" onclick="launchPlugin('${p.id}')" ${!p.enabled?'disabled style="opacity:.4;cursor:default"':''}>launch</button>
      ${hasUpdate?`<button class="btn btn-ok" onclick="updatePlugin('${p.id}')">update to ${latest.version}</button>`:''}
      <button class="btn btn-danger" style="margin-left:auto" onclick="removePlugin('${p.id}')">remove</button>
    </div>
    ${!p.enabled?'<div style="font-size:10px;color:var(--color-text-tertiary);margin-top:10px;font-family:var(--font-mono)">enable the plugin to launch it</div>':''}
  </div>`;
}

function renderPluginWindow(m, id){
  const p=installed.find(x=>x.id===id);
  if(!p){return;}

  let body='';
  if(id==='recent-libraries') body=buildRecentLibraries();
  else if(id==='file-creator') body=buildFileCreator();
  else if(id==='ai-tagger') body=buildAITagger();
  else body=buildGenericPlugin(p);

  m.innerHTML=`<div class="plugin-win">
    <div class="plugin-win-bar">
      <div style="display:flex;flex-direction:column">
        <div class="plugin-win-title">${p.name}</div>
        <div class="plugin-win-meta">${p.id} · v${p.version} · ${p.source==='local'?'local':p.bucket}</div>
      </div>
      <button class="btn" style="margin-left:auto;font-size:10px;padding:4px 9px" onclick="closePlugin()">close</button>
    </div>
    <div class="plugin-win-body" id="plugin-body">${body}</div>
  </div>`;

  if(id==='recent-libraries') initRecentLibraries();
  else if(id==='file-creator') initFileCreator();
  else if(id==='ai-tagger') initAITagger();
}

function buildRecentLibraries(){
  return`<div>
    <div id="lib-notif" class="notif"></div>
    <div class="plugin-ctrl-row">
      <input class="plugin-input" id="lib-filter" type="text" placeholder="filter libraries..."/>
      <button class="btn" onclick="libRefresh()">refresh</button>
      <button class="btn btn-danger" onclick="libClearInvalid()">clear invalid</button>
    </div>
    <div id="lib-list"></div>
  </div>`;
}

function initRecentLibraries(){
  renderLibList(MOCK_LIBS);
  document.getElementById('lib-filter').oninput=function(){
    const q=this.value.toLowerCase();
    renderLibList(MOCK_LIBS.filter(l=>l.name.toLowerCase().includes(q)||l.path.toLowerCase().includes(q)));
  };
}

function renderLibList(libs){
  const el=document.getElementById('lib-list');
  if(!el)return;
  el.innerHTML=libs.map(l=>`
    <div class="card-item">
      <div class="card-item-main">
        <div class="card-item-name">${l.name}</div>
        <div class="card-item-path">${l.path}</div>
      </div>
      <span class="badge ${l.valid?'badge-ok':'badge-warn'}">${l.valid?'valid':'invalid'}</span>
      <div class="card-item-actions">
        <button class="card-btn" onclick="libOpen('${l.name}')">open</button>
        <button class="card-btn card-btn-danger" onclick="libRemove('${l.name}')">remove</button>
      </div>
    </div>
  `).join('');
}

function libNotif(msg){
  const el=document.getElementById('lib-notif');
  if(!el)return;
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>{if(el)el.style.display='none';},2000);
}
function libOpen(name){libNotif('switched to '+name);}
function libRemove(name){
  const idx=MOCK_LIBS.findIndex(l=>l.name===name);
  if(idx>-1)MOCK_LIBS.splice(idx,1);
  renderLibList(MOCK_LIBS);
}
function libRefresh(){libNotif('libraries refreshed');renderLibList(MOCK_LIBS);}
function libClearInvalid(){
  MOCK_LIBS.splice(0,MOCK_LIBS.length,...MOCK_LIBS.filter(l=>l.valid));
  renderLibList(MOCK_LIBS);
  libNotif('invalid libraries cleared');
}

function buildFileCreator(){
  return`<div>
    <div id="fc-notif" class="notif"></div>
    <div class="plugin-ctrl-row">
      <button class="btn" onclick="fcOpenDialog()">+ create new file</button>
    </div>
    <div class="sec-label" style="margin-bottom:6px">saved extensions</div>
    <div id="fc-exts"></div>
    <div id="fc-dialog" style="display:none;margin-top:14px">
      <div class="box">
        <div class="sec-label">new file</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input class="plugin-input" id="fc-name" placeholder="filename" style="flex:2"/>
          <input class="plugin-input" id="fc-ext"  placeholder="extension" style="flex:1"/>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ok" onclick="fcCreate()">create</button>
          <button class="btn" onclick="document.getElementById('fc-dialog').style.display='none'">cancel</button>
        </div>
      </div>
    </div>
    <div id="fc-files" style="margin-top:14px"></div>
  </div>`;
}

const fcExts=['json','md','txt'];
const fcFiles=[];
function initFileCreator(){renderFCExts();renderFCFiles();}
function renderFCExts(){
  const el=document.getElementById('fc-exts');
  if(!el)return;
  el.innerHTML=fcExts.map(e=>`<span class="ext-chip" onclick="fcQuickCreate('${e}')">.${e}</span>`).join('')
    +`<span class="ext-chip" style="border-style:dashed" onclick="fcOpenDialog()">+ add</span>`;
}
function renderFCFiles(){
  const el=document.getElementById('fc-files');
  if(!el)return;
  if(!fcFiles.length){el.innerHTML='<div style="font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono)">no files created yet</div>';return;}
  el.innerHTML=fcFiles.map(f=>`<div class="card-item"><div class="card-item-main"><div class="card-item-name">${f}</div></div><span class="badge badge-ok">created</span></div>`).join('');
}
function fcOpenDialog(){document.getElementById('fc-dialog').style.display='block';}
function fcCreate(){
  const name=document.getElementById('fc-name')?.value?.trim();
  const ext=document.getElementById('fc-ext')?.value?.trim();
  if(!name||!ext)return;
  fcFiles.push(`${name}.${ext}`);
  if(!fcExts.includes(ext)){fcExts.push(ext);renderFCExts();}
  document.getElementById('fc-dialog').style.display='none';
  renderFCFiles();
  const n=document.getElementById('fc-notif');
  if(n){n.textContent=`created ${name}.${ext}`;n.style.display='block';setTimeout(()=>{if(n)n.style.display='none';},2000);}
}
function fcQuickCreate(ext){
  const name=`file-${Date.now().toString().slice(-4)}`;
  fcFiles.push(`${name}.${ext}`);
  renderFCFiles();
  const n=document.getElementById('fc-notif');
  if(n){n.textContent=`created ${name}.${ext}`;n.style.display='block';setTimeout(()=>{if(n)n.style.display='none';},2000);}
}

function buildAITagger(){
  return`<div>
    <div id="at-notif" class="notif"></div>
    <div class="plugin-ctrl-row">
      <button class="btn btn-launch" id="at-run-btn" onclick="atRun()">tag selected</button>
      <button class="btn" onclick="atSelectAll()">select all</button>
      <span style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono)" id="at-status">idle</span>
    </div>
    <div id="at-prog" style="display:none;margin-bottom:12px">
      <div class="prog-track"><div class="prog-bar" id="at-bar"></div></div>
      <div class="prog-label" id="at-prog-label">0%</div>
    </div>
    <div id="at-items"></div>
  </div>`;
}

const atItems=MOCK_ITEMS.map(i=>({...i,selected:false,tags:[...i.tags]}));
function initAITagger(){renderATItems();}
function renderATItems(){
  const el=document.getElementById('at-items');
  if(!el)return;
  el.innerHTML=atItems.map((item,i)=>`
    <div class="card-item" style="cursor:pointer;border-color:${item.selected?'#5DCAA5':'var(--color-border-tertiary)'}" onclick="atToggle(${i})">
      <div style="width:14px;height:14px;border-radius:3px;border:0.5px solid ${item.selected?'#1D9E75':'var(--color-border-secondary)'};background:${item.selected?'#1D9E75':'transparent'};flex-shrink:0"></div>
      <div class="card-item-main">
        <div class="card-item-name">${item.name}</div>
        <div style="margin-top:3px">${item.tags.length?item.tags.map(t=>`<span class="tag-chip">${t}</span>`).join(''):'<span style="font-size:10px;color:var(--color-text-tertiary)">no tags</span>'}</div>
      </div>
    </div>
  `).join('');
}
function atToggle(i){atItems[i].selected=!atItems[i].selected;renderATItems();}
function atSelectAll(){atItems.forEach(i=>i.selected=true);renderATItems();}

const TAG_SETS=[
  ['design','illustration','vector','minimal'],
  ['photography','landscape','nature','outdoor'],
  ['ui','interface','component','wireframe'],
  ['texture','abstract','pattern','organic'],
];

function atRun(){
  const sel=atItems.filter(i=>i.selected);
  if(!sel.length){
    const n=document.getElementById('at-notif');
    if(n){n.textContent='select at least one item';n.style.display='block';setTimeout(()=>{if(n)n.style.display='none';},2000);}
    return;
  }
  const prog=document.getElementById('at-prog');
  const bar=document.getElementById('at-bar');
  const lbl=document.getElementById('at-prog-label');
  const stat=document.getElementById('at-status');
  const btn=document.getElementById('at-run-btn');
  prog.style.display='block';
  if(btn)btn.disabled=true;
  if(stat)stat.textContent='running';
  let done=0;
  sel.forEach((item,i)=>{
    setTimeout(()=>{
      item.tags=[...new Set([...item.tags,...TAG_SETS[i%TAG_SETS.length]])];
      done++;
      const pct=Math.round((done/sel.length)*100);
      if(bar)bar.style.width=pct+'%';
      if(lbl)lbl.textContent=pct+'%';
      renderATItems();
      if(done===sel.length){
        if(stat)stat.textContent='done';
        if(btn)btn.disabled=false;
        const n=document.getElementById('at-notif');
        if(n){n.textContent=`tagged ${done} item${done>1?'s':''}`;n.style.display='block';setTimeout(()=>{if(n)n.style.display='none';},2500);}
      }
    },(i+1)*700);
  });
}

function buildGenericPlugin(p){
  return`<div style="padding:20px 0">
    <div style="font-size:13px;color:var(--color-text-secondary);font-family:var(--font-mono);text-align:center">${p.name} is running</div>
    <div style="font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono);text-align:center;margin-top:6px">no mock ui available for this plugin</div>
  </div>`;
}

function togglePlugin(id){const p=installed.find(x=>x.id===id);if(p)p.enabled=!p.enabled;if(launchedId===id&&!p.enabled)launchedId=null;render();}
function removePlugin(id){const idx=installed.findIndex(p=>p.id===id);if(idx>-1)installed.splice(idx,1);if(selInstalled===id)selInstalled=null;if(launchedId===id)launchedId=null;render();}
function updatePlugin(id){const p=installed.find(x=>x.id===id);const b=BUCKETS.find(b=>b.id===p.bucket);const l=b?.plugins.find(x=>x.id===id);if(p&&l)p.version=l.version;render();}

function render(){renderSide();renderMain();}

function renderBuckets(m){
  const bucket=BUCKETS.find(b=>b.id===selBucket)||BUCKETS[0];
  m.innerHTML=`<div class="sec">
    <div class="sec-label">managed buckets</div>
    <div class="box" style="padding:0">
      ${BUCKETS.map(b=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;background:${b.id===selBucket?'var(--color-background-primary)':'transparent'}" onclick="selBucket='${b.id}';renderBuckets(document.getElementById('main'))">
          <div style="flex:1">
            <div style="font-size:11px;font-weight:500;color:var(--color-text-primary)">${b.name}</div>
            <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:1px">${b.url}</div>
          </div>
          <span class="badge badge-ok" style="font-size:9px">synced ${b.lastSync}</span>
          <button class="btn" style="font-size:10px;padding:3px 8px" onclick="event.stopPropagation();syncBucket('${b.id}')">sync</button>
          <button class="btn btn-danger" style="font-size:10px;padding:3px 8px" onclick="event.stopPropagation();removeBucket('${b.id}')">remove</button>
        </div>
      `).join('')}
      <div style="padding:8px 13px;display:flex;gap:7px">
        <input class="input-full" id="bucket-url-input" type="text" placeholder="https://github.com/user/my-bucket" style="flex:1"/>
        <button class="btn" onclick="addBucket()">add bucket</button>
      </div>
    </div>
    <div class="sec-label">index — ${bucket.name} (${bucket.plugins.length} plugins)</div>
    <div class="box" style="padding:0 13px">
      ${bucket.plugins.map(p=>{
        const inst=installed.find(i=>i.id===p.id);
        const instBadge=inst?(inst.version===p.version?`<span class="badge badge-ok">installed ${inst.version}</span>`:`<span class="badge badge-warn">installed ${inst.version}</span>`):'';
        return`<div class="pkg-row">
          <div style="flex:1">
            <div class="pkg-name">${p.name} <span style="font-size:10px;font-weight:400;color:var(--color-text-tertiary)">v${p.version}</span></div>
            <div class="pkg-id">${p.id} · ${p.description}</div>
          </div>
          ${instBadge}
          ${inst?`<button class="btn btn-danger" style="font-size:10px;padding:3px 8px" onclick="removePlugin('${p.id}')">remove</button>`:`<button class="btn" style="font-size:10px;padding:3px 8px" onclick="installFromBucket('${bucket.id}','${p.id}')">install</button>`}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderURL(m){
  m.innerHTML=`<div class="sec">
    <div class="sec-label">install from url</div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input class="input-full" id="url-input" type="text" placeholder="https://example.com/my-plugin.zip" style="flex:1"/>
      <button class="btn" onclick="installFromURL()">install</button>
    </div>
    <div id="url-prog" style="display:none;margin-bottom:14px">
      <div class="prog-track"><div class="prog-bar" id="url-bar"></div></div>
      <div style="font-size:10px;color:var(--color-text-secondary);margin-top:4px;font-family:var(--font-mono)" id="url-label"></div>
    </div>
    <div id="url-log" class="log-box" style="display:none"></div>
    <div class="divider"></div>
    <div class="sec-label">about local plugins</div>
    <div class="box" style="line-height:1.8">
      <div class="row"><span class="row-key">source</span><span class="row-val"><span class="badge badge-local">local</span> — not tied to any bucket</span></div>
      <div class="row"><span class="row-key">updates</span><span class="row-val">manual only — re-paste url to upgrade</span></div>
      <div class="row"><span class="row-key">conflicts</span><span class="row-val">ignored — local always wins over bucket</span></div>
      <div class="row"><span class="row-key">format</span><span class="row-val">must be a .zip containing plugin.js</span></div>
    </div>
  </div>`;
}

function installFromBucket(bucketId,pluginId){
  const bucket=BUCKETS.find(b=>b.id===bucketId);
  const plugin=bucket?.plugins.find(p=>p.id===pluginId);
  if(!plugin)return;
  if(!installed.find(p=>p.id===pluginId)){installed.push({...plugin,enabled:true,source:'bucket',bucket:bucketId});}
  selInstalled=pluginId;
  nav('installed');
}

function addBucket(){
  const input=document.getElementById('bucket-url-input');
  const url=input?.value?.trim();
  if(!url)return;
  const id=url.split('/').pop()||'custom-bucket';
  if(!BUCKETS.find(b=>b.id===id))BUCKETS.push({id,name:id,url,branch:'main',lastSync:'never',status:'ok',plugins:[]});
  if(input)input.value='';
  renderBuckets(document.getElementById('main'));
}

function removeBucket(id){
  const idx=BUCKETS.findIndex(b=>b.id===id);
  if(idx>-1)BUCKETS.splice(idx,1);
  if(BUCKETS.length)selBucket=BUCKETS[0].id;
  renderBuckets(document.getElementById('main'));
}

function syncBucket(id){
  const b=BUCKETS.find(x=>x.id===id);
  if(b)b.lastSync=new Date().toISOString().split('T')[0];
  renderBuckets(document.getElementById('main'));
}

function installFromURL(){
  const input=document.getElementById('url-input');
  const url=input?.value?.trim();
  if(!url)return;
  const prog=document.getElementById('url-prog');
  const bar=document.getElementById('url-bar');
  const lbl=document.getElementById('url-label');
  const log=document.getElementById('url-log');
  prog.style.display='block';log.style.display='block';log.innerHTML='';
  const steps=[[10,'info','→ fetching zip...'],[25,'info','→ download complete'],[38,'info','→ extracting archive...'],[52,'info','→ reading manifest (static import)...'],[64,'ok','✓ id: my-local-plugin · type: button'],[74,'info','→ sha256 caching render/card.json...'],[83,'ok','✓ template cached'],[91,'ok','✓ stateVersion: 1, no migration needed'],[97,'info','→ loading flat registry (5 files)...'],[100,'ok','✓ installed as local plugin']];
  let i=0;const fakeId='my-local-plugin';
  function tick(){
    if(i>=steps.length){
      lbl.textContent='installed';
      if(!installed.find(p=>p.id===fakeId))installed.push({id:fakeId,name:'My Local Plugin',version:'1.0.0',type:'button',keywords:['local'],enabled:true,source:'local',url,description:'Installed from url'});
      selInstalled=fakeId;
      setTimeout(()=>nav('installed'),500);
      return;
    }
    const [pct,cls,msg]=steps[i++];
    bar.style.width=pct+'%';lbl.textContent=msg.replace(/^[→✓] /,'');
    const ln=document.createElement('div');ln.className='log-'+cls;ln.textContent=msg;
    log.appendChild(ln);log.scrollTop=log.scrollHeight;
    setTimeout(tick,300);
  }
  tick();
}

nav('buckets');
</script>
